# OpenCodeReview - GitHub Actions PR Auto-Review
#
# The OCR binary is built from this repo's source (cmd/opencodereview) so the
# workflow can exercise the in-tree code rather than Alibaba's published
# @alibaba-group/open-code-review npm package. For `issue_comment` triggers
# (which have repository secrets), the binary is built from the trusted base
# ref; the PR head is only fetched as a git ref and treated as review data.
# For `pull_request` triggers (no fork secrets) the binary is built from the
# PR head so review-tool changes in the PR are live-tested.
#
# Triggers:
#   - PR opened, synchronized, reopened, or marked ready_for_review
#   - Comment on PR containing '/open-code-review', '@open-code-review' or '@ocr'
#
# Required repository variables:
#   LLM_PROVIDER       - "bedrock" or "spark" (default: bedrock)
#   OCR_LLM_MODEL      - Model name for Bedrock
#   OCR_SPARK_LLM_MODEL - Model name for Spark
#
# Required secrets:
#   OCR_LLM_AUTH_TOKEN - Auth token for Bedrock
#   OCR_SPARK_LLM_AUTH_TOKEN - Auth token for Spark
#
# Optional:
#   vars.OCR_LLM_URL or secrets.OCR_LLM_URL - Bedrock LLM URL
#   vars.OCR_LLM_USE_ANTHROPIC - Use Anthropic mode (default: false)
#   secrets.TS_OAUTH_CLIENT_ID, secrets.TS_OAUTH_SECRET - Tailscale for Spark
#
# Fork PR note: `pull_request` events for fork PRs do not have access to
# repository secrets. Fork PR authors should trigger review via the comment
# flow (e.g. `@ocr`) which runs on `issue_comment` and has secret access.

name: Andorra Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  # Real OCR runs (pull_request events + authorized @ocr/@open-code-review/
  # /open-code-review comments from MEMBER/COLLABORATOR/OWNER) share the
  # per-PR group so a new push cancels an in-flight review. Unrelated or
  # unauthorized comments get isolated by comment id so they cannot cancel
  # an in-progress run via cancel-in-progress (the job-level if-gate
  # filters too late).
  group: ocr-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref_name }}-${{ (github.event_name == 'pull_request' || ((github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'OWNER') && (startsWith(github.event.comment.body, '/open-code-review') || startsWith(github.event.comment.body, '@open-code-review') || startsWith(github.event.comment.body, '@ocr')))) && 'pr' || github.event.comment.id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    # ubuntu-slim is the cheapest 1-core runner; sufficient for git fetch,
    # the Go build, and a single LLM round-trip. Spark needs the Tailscale
    # action, which requires apt/sudo/daemon control that the slim image
    # doesn't provide — fall back to ubuntu-latest only in that case.
    runs-on: ${{ contains(fromJSON('["spark", "Spark", "SPARK", " spark", "spark ", " spark "]'), vars.LLM_PROVIDER) && 'ubuntu-latest' || 'ubuntu-slim' }}
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.author_association == 'OWNER'
        ) &&
        (
          startsWith(github.event.comment.body, '/open-code-review') ||
          startsWith(github.event.comment.body, '@open-code-review') ||
          startsWith(github.event.comment.body, '@ocr')
        )
      )

    steps:
      - name: Get PR context for comment trigger
        id: pr-context
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', pr.head.sha);

      - name: React OCR started
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.issue.number;
            try {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                content: 'eyes'
              });
            } catch (e) {
              core.info(`Skipping reaction: ${e.message}`);
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # For issue_comment events (which have secrets), check out the
          # trusted base ref so the binary we build never comes from a
          # potentially untrusted fork PR. The PR head is fetched as a ref
          # below and used only as diff/review data. For pull_request events
          # the PR head is checked out so review-tool changes are live-tested.
          ref: ${{ github.event_name == 'issue_comment' && steps.pr-context.outputs.base_ref || github.event.pull_request.head.sha || github.sha }}

      - name: Validate checkout ref
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          EXPECTED_BASE_REF="${{ steps.pr-context.outputs.base_ref }}"
          EXPECTED_HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          if [ -z "$EXPECTED_BASE_REF" ] || [ -z "$EXPECTED_HEAD_SHA" ]; then
            echo "ERROR: Could not resolve PR context from pr-context step"
            exit 1
          fi
          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Checked out base ref SHA: $CURRENT_SHA"
          if [ -z "$CURRENT_SHA" ] || [ "$CURRENT_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "ERROR: Failed to checkout valid revision"
            exit 1
          fi
          # Ensure the PR head commit is available for the diff/review step.
          if ! git rev-parse --verify "${EXPECTED_HEAD_SHA}^{commit}" >/dev/null 2>&1; then
            echo "ERROR: PR head SHA $EXPECTED_HEAD_SHA is not available"
            exit 1
          fi

      - name: Fetch base branch
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
          else
            BASE_REF="${{ steps.pr-context.outputs.base_ref }}"
          fi
          git fetch origin "${BASE_REF}:${BASE_REF}" || git fetch origin "${BASE_REF}"

      - name: Fetch PR head ref
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          # The PR head lives in the contributor's fork; fetch it as a named
          # ref so the review step can diff against it without building from
          # potentially untrusted source.
          PR_NUMBER="${{ github.event.issue.number }}"
          git fetch origin "pull/${PR_NUMBER}/head:pr-head"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build OCR from source
        # Build this repo's OCR binary. For pull_request events this compiles
        # the PR head so review-tool changes are live-tested. For issue_comment
        # events the checkout step already placed us on the trusted base ref,
        # so the binary that receives secrets is never built from a fork PR.
        shell: bash
        run: |
          make build
          sudo install -m 0755 dist/opencodereview /usr/local/bin/ocr
          ocr --version || ocr -v || true

      - name: Resolve LLM provider
        id: llm-provider
        shell: bash
        env:
          LLM_PROVIDER_FROM_VAR: ${{ vars.LLM_PROVIDER }}
        run: |
          PROVIDER="$(printf '%s' "${LLM_PROVIDER_FROM_VAR:-bedrock}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]' | tr -d '"' | tr -d "'")"
          echo "Resolved LLM provider: $PROVIDER"
          if [ "$PROVIDER" != "bedrock" ] && [ "$PROVIDER" != "spark" ]; then
            echo "Invalid LLM_PROVIDER: $PROVIDER"
            echo "Set repository variable LLM_PROVIDER to exactly bedrock or spark."
            exit 1
          fi
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale for Spark
        if: ${{ steps.llm-provider.outputs.provider == 'spark' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Wait for Spark tailnet peer
        if: ${{ steps.llm-provider.outputs.provider == 'spark' }}
        shell: bash
        # Tailscale peer info is eventually consistent; the LLM test step
        # below can fail with a transient name-resolution or connection error
        # if it runs before the spark peer is reachable. We only need
        # reachability (HTTP works over DERP relays too), so pass
        # --until-direct=false — otherwise a peer that is reachable only via
        # DERP returns non-zero with "direct connection not established"
        # and would fail this check unnecessarily.
        run: |
          for i in $(seq 1 30); do
            if tailscale ping --until-direct=false -c 1 spark.tail93d320.ts.net >/dev/null 2>&1; then
              echo "Spark peer reachable after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Spark peer not reachable after 60s"
          exit 1

      - name: Configure OCR (non-secret only)
        # Resolve URL / model / use_anthropic from repository variables (with
        # secret fallbacks for legacy installations) and expose them as job
        # env vars via $GITHUB_ENV. The auth token is intentionally NOT
        # written here — it goes straight from secrets to the steps that
        # need it via step-level `env:`, so the secret never lands in
        # ~/.opencodereview/config.json on the runner.
        shell: bash
        env:
          LLM_PROVIDER: ${{ steps.llm-provider.outputs.provider }}
          BEDROCK_LLM_URL_FROM_VAR: ${{ vars.OCR_LLM_URL }}
          BEDROCK_LLM_URL_FROM_SECRET: ${{ secrets.OCR_LLM_URL }}
          BEDROCK_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          BEDROCK_LLM_MODEL_FROM_VAR: ${{ vars.OCR_LLM_MODEL }}
          BEDROCK_LLM_MODEL_FROM_SECRET: ${{ secrets.OCR_LLM_MODEL }}
          BEDROCK_LLM_USE_ANTHROPIC_FROM_VAR: ${{ vars.OCR_LLM_USE_ANTHROPIC }}
          BEDROCK_LLM_USE_ANTHROPIC_FROM_SECRET: ${{ secrets.OCR_LLM_USE_ANTHROPIC }}
          SPARK_LLM_URL: http://spark.tail93d320.ts.net:9090/v1
          SPARK_LLM_AUTH_TOKEN: ${{ secrets.OCR_SPARK_LLM_AUTH_TOKEN }}
          SPARK_LLM_MODEL: ${{ vars.OCR_SPARK_LLM_MODEL }}
        run: |
          if [ "$LLM_PROVIDER" = "spark" ]; then
            if [ -z "$SPARK_LLM_AUTH_TOKEN" ]; then
              echo "ERROR: secrets.OCR_SPARK_LLM_AUTH_TOKEN is required for Spark provider."
              exit 1
            fi
            if [ -z "$SPARK_LLM_MODEL" ]; then
              echo "WARNING: vars.OCR_SPARK_LLM_MODEL is not set, using default model"
            fi
            URL="$SPARK_LLM_URL"
            MODEL="${SPARK_LLM_MODEL:-Qwen3.5-122B-A10B-FP8}"
            USE_ANTHROPIC="false"
          else
            URL="${BEDROCK_LLM_URL_FROM_VAR:-$BEDROCK_LLM_URL_FROM_SECRET}"
            MODEL="${BEDROCK_LLM_MODEL_FROM_VAR:-$BEDROCK_LLM_MODEL_FROM_SECRET}"
            USE_ANTHROPIC="${BEDROCK_LLM_USE_ANTHROPIC_FROM_VAR:-${BEDROCK_LLM_USE_ANTHROPIC_FROM_SECRET:-false}}"
            if [ -z "$URL" ]; then
              echo "Missing Bedrock LLM URL. Set vars.OCR_LLM_URL or secrets.OCR_LLM_URL."
              exit 1
            fi
            if [ -z "$BEDROCK_LLM_AUTH_TOKEN" ]; then
              echo "Missing secrets.OCR_LLM_AUTH_TOKEN."
              exit 1
            fi
            if [ -z "$MODEL" ]; then
              echo "Missing OCR_LLM_MODEL. Set vars.OCR_LLM_MODEL or secrets.OCR_LLM_MODEL."
              exit 1
            fi
          fi
          {
            echo "OCR_LLM_URL=$URL"
            echo "OCR_LLM_MODEL=$MODEL"
            echo "OCR_USE_ANTHROPIC=$USE_ANTHROPIC"
          } >> "$GITHUB_ENV"

      - name: Test OCR connection
        env:
          # Auth token is passed via step-level env so it never lands in
          # the on-disk config file. See the "Configure OCR (non-secret
          # only)" step above for the rationale.
          OCR_LLM_TOKEN: ${{ steps.llm-provider.outputs.provider == 'spark' && secrets.OCR_SPARK_LLM_AUTH_TOKEN || secrets.OCR_LLM_AUTH_TOKEN }}
        run: ocr llm test

      - name: Run OpenCodeReview
        id: ocr-run
        shell: bash
        env:
          OCR_LLM_TOKEN: ${{ steps.llm-provider.outputs.provider == 'spark' && secrets.OCR_SPARK_LLM_AUTH_TOKEN || secrets.OCR_LLM_AUTH_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ steps.pr-context.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr-context.outputs.head_sha }}"
          fi
          echo "Reviewing ${HEAD_SHA} against origin/${BASE_REF}"
          # Capture exit status without failing the step so the post step can
          # surface OCR errors (stderr, exit code) on the PR. Reviewers should
          # not have to open Actions logs to learn why coverage is missing.
          set +e
          ocr review \
            --from "origin/${BASE_REF}" \
            --to "${HEAD_SHA}" \
            --format json \
            --audience agent \
            --concurrency 4 \
            > /tmp/ocr-result.json 2>/tmp/ocr-stderr.log
          OCR_EXIT=$?
          set -e
          echo "ocr_exit_code=${OCR_EXIT}" >> "$GITHUB_OUTPUT"
          echo "OCR exit code: ${OCR_EXIT}"

          cat /tmp/ocr-stderr.log || true
          cat /tmp/ocr-result.json || true

      - name: Post OCR review to PR
        # Run on success and on real failures (so OCR errors surface on the
        # PR), but NOT on cancellation. A newer push or @ocr comment via
        # concurrency cancel-in-progress would otherwise spam a stale
        # "produced no output" comment from the run that just got cancelled.
        if: ${{ !cancelled() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request?.number || context.issue.number;
            const commitSha = context.payload.pull_request?.head?.sha || '${{ steps.pr-context.outputs.head_sha }}';
            const ocrExitCode = '${{ steps.ocr-run.outputs.ocr_exit_code }}';

            let stderr = '';
            try { stderr = fs.readFileSync('/tmp/ocr-stderr.log', 'utf8'); } catch (_) { /* missing */ }

            function failureHeader(reason) {
              let header = `OpenCodeReview ${reason}.`;
              if (ocrExitCode && /^\d+$/.test(ocrExitCode) && ocrExitCode !== '0') {
                header += ` (exit code: ${ocrExitCode})`;
              }
              return header;
            }

            function errorBody(reason) {
              let body = failureHeader(reason);
              if (stderr.trim()) {
                const trimmed = stderr.slice(0, 6000);
                body += `\n\n${safeFence(trimmed)}\n${trimmed}\n${safeFence(trimmed)}`;
              }
              return body;
            }

            let raw = '';
            try { raw = fs.readFileSync('/tmp/ocr-result.json', 'utf8').trim(); } catch (_) { /* missing */ }

            let parsed = {};
            if (!raw) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: errorBody('produced no output')
              });
              return;
            }
            try {
              parsed = JSON.parse(raw);
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: errorBody('failed to parse output')
              });
              return;
            }
            if (!parsed || (typeof parsed === 'object' && Object.keys(parsed).length === 0)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: errorBody('produced empty output')
              });
              return;
            }

            const rawComments = extractComments(parsed);
            const rawCount = rawComments.length;
            const evaluatedComments = rawComments.map((comment) => {
              const normalized = normalizeComment(comment);
              return { comment: normalized, decision: evaluateComment(normalized) };
            });
            const comments = evaluatedComments.filter((item) => item.decision.keep).map((item) => item.comment);
            const filteredComments = evaluatedComments.filter((item) => !item.decision.keep);
            const filterDebug = formatFilterDebug(rawCount, comments.length, filteredComments);

            if (comments.length === 0) {
              let body = `OpenCodeReview: No actionable issues found.\n\n`;
              body += partialCoverageBlock(parsed);
              body += filterDebug;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
              return;
            }

            const inlineComments = [];
            const summaryOnly = [];
            for (const c of comments) {
              const body = formatComment(c);
              const startLine = c.start_line;
              const endLine = c.end_line;
              const line = c.line || endLine || startLine;
              if (!c.path || !line || line < 1) {
                summaryOnly.push({ comment: c, body });
              } else if (startLine && endLine && startLine !== endLine) {
                inlineComments.push({ path: c.path, start_line: startLine, line: endLine, start_side: 'RIGHT', side: 'RIGHT', body });
              } else {
                inlineComments.push({ path: c.path, line, side: 'RIGHT', body });
              }
            }

            let summary = `OpenCodeReview found ${comments.length} actionable issue(s).\n\n`;
            summary += partialCoverageBlock(parsed);
            summary += `- ${inlineComments.length} inline comment(s)\n`;
            summary += `- ${summaryOnly.length} summary comment(s)\n\n`;
            summary += filterDebug;

            for (const item of summaryOnly) {
              summary += `\n---\n\n${item.comment.path || 'unknown file'}\n\n${item.body}\n`;
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitSha,
                event: 'COMMENT',
                body: summary,
                comments: inlineComments
              });
            } catch (bulkErr) {
              // Bulk review failed (often one bad line position rejects the
              // whole batch). Retry each inline comment individually so valid
              // ones still land at their code location; collect failures.
              const failedInline = [];
              for (const ic of inlineComments) {
                try {
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: commitSha,
                    event: 'COMMENT',
                    body: '',
                    comments: [ic]
                  });
                } catch (indErr) {
                  failedInline.push({ inline: ic, error: indErr.message });
                }
              }

              let body = `${summary}\n\nCould not post inline comments: ${bulkErr.message}\n`;
              for (const item of failedInline) {
                body += `\n---\n\n${item.inline.path || 'unknown file'}:${item.inline.line || '?'}\n\n${item.inline.body}\n`;
              }
              const MAX_LENGTH = 65000;
              if (body.length > MAX_LENGTH) {
                body = body.slice(0, MAX_LENGTH - 200) + '\n\n⚠️ **CONTENT TRUNCATED**: Review output exceeded 65000 characters. Some findings may be missing. Check workflow logs for complete output.';
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

            function extractComments(result) {
              if (Array.isArray(result)) return result;
              for (const key of ['comments', 'issues', 'findings', 'results']) {
                if (Array.isArray(result[key])) return result[key];
              }
              return [];
            }

            function normalizeComment(c) {
              const text = getCommentText(c);
              const normalized = { ...c };
              const current = String(c.severity || c.priority || c.level || '').toUpperCase();
              // Only infer severity from explicit labels for actionable severities.
              // Never infer P3 (low) from arbitrary prose words like "style" that
              // can appear in otherwise-dangerous findings, because that would
              // filter them out before hasDangerSignal runs.
              if (!current) {
                if (/\b(P0|CRITICAL|BLOCKER)\b/i.test(text)) normalized.severity = 'P0';
                else if (/\b(P1|HIGH|MAJOR)\b/i.test(text)) normalized.severity = 'P1';
                else if (/\b(P2|MEDIUM|MINOR)\b/i.test(text)) normalized.severity = 'P2';
              }
              return normalized;
            }

            function evaluateComment(c) {
              const text = getCommentText(c);
              const severity = String(c.severity || c.priority || c.level || '').toUpperCase();

              if (['P3', 'LOW', 'MINOR', 'NIT', 'STYLE', 'INFO', 'SUGGESTION'].includes(severity)) {
                return { keep: false, reason: `low severity ${severity}` };
              }

              if (['P0', 'P1', 'P2', 'CRITICAL', 'BLOCKER', 'HIGH', 'MAJOR', 'MEDIUM'].includes(severity)) {
                return { keep: true, reason: `kept severity ${severity}` };
              }

              if (isNitOnly(text)) {
                return { keep: false, reason: 'nit/style-only text' };
              }

              if (hasStructuredFinding(c)) {
                return { keep: true, reason: 'kept structured finding without severity' };
              }

              if (hasDangerSignal(text)) {
                return { keep: true, reason: 'kept danger-pattern finding without severity' };
              }

              return { keep: false, reason: 'no severity and no actionable signal' };
            }

            function isNitOnly(text) {
              return /(nitpick|nit:|style|readability|prefer|consider|could be|might be better|best practice|cleaner|naming|rename|comment|documentation|docs|formatting|whitespace|indentation|minor refactor|minor issue|dry|duplicate code|maintainability|cosmetic|subjective|non-blocking)/i.test(text) && !hasDangerSignal(text);
            }

            function hasDangerSignal(text) {
              return /(crash|exception|throws|undefined|null pointer|null reference|race condition|deadlock|auth|authentication|authorization|permission|tenant|cross-tenant|data loss|data corruption|corruption|leak|secret|credential|sql injection|xss|csrf|xsrf|ssrf|idor|privilege escalation|priv escalation|path traversal|directory traversal|command injection|os injection|deserialization|buffer overflow|injection|token|jwt|session|encryption|decryption|ssl|tls|certificate|payment|billing|migration|production outage|regression|incorrect result|wrong data|broken api|runtime error|destructive|timeout|infinite loop|memory leak|fails at runtime|failure at runtime)/i.test(text);
            }

            function hasStructuredFinding(c) {
              // Treat any comment with a path and body as structured, even when
              // line fields are zero (OCR represents unresolved locations as 0).
              const hasLocation = Boolean(c.path);
              const hasBody = Boolean(c.content || c.message || c.body || c.title || c.description || c.reason || c.suggestion);
              return hasLocation && hasBody;
            }

            function formatFilterDebug(rawCount, keptCount, filtered) {
              const reasonCounts = {};
              for (const item of filtered) {
                reasonCounts[item.decision.reason] = (reasonCounts[item.decision.reason] || 0) + 1;
              }

              let text = `OCR filter debug:\n`;
              text += `- Raw OCR findings: ${rawCount}\n`;
              text += `- Posted findings: ${keptCount}\n`;
              text += `- Filtered findings: ${filtered.length}\n`;

              if (filtered.length > 0) {
                text += `- Filter reasons:\n`;
                for (const [reason, count] of Object.entries(reasonCounts)) {
                  text += `  - ${reason}: ${count}\n`;
                }

                text += `\nFiltered sample:\n`;
                for (const item of filtered.slice(0, 5)) {
                  const c = item.comment;
                  const line = c.line || c.start_line || c.end_line || '?';
                  const snippet = getCommentText(c).replace(/\s+/g, ' ').slice(0, 220);
                  text += `- ${item.decision.reason} | ${c.path || 'unknown file'}:${line} | ${snippet}\n`;
                }
              }

              return text.trim();
            }

            function getCommentText(c) {
              return [c.content, c.message, c.body, c.title, c.reason, c.description, c.suggestion, c.severity, c.priority, c.level]
                .filter(Boolean)
                .join('\n')
                .toLowerCase();
            }

            function formatComment(c) {
              let body = c.content || c.message || c.body || JSON.stringify(c, null, 2);
              const severity = c.severity || c.priority || c.level;
              if (severity && !body.toLowerCase().includes(String(severity).toLowerCase())) body = `Severity: ${severity}\n\n${body}`;
              if (c.suggestion_code) {
                const fence = safeFence(c.suggestion_code);
                body += `\n\nSuggestion:\n${fence}suggestion\n${c.suggestion_code}\n${fence}`;
              }
              return body;
            }

            function safeFence(content) {
              const matches = String(content || '').match(/`+/g) || [];
              const maxTicks = matches.reduce((max, m) => Math.max(max, m.length), 0);
              return '`'.repeat(Math.max(3, maxTicks + 1));
            }

            function partialCoverageBlock(parsed) {
              // Surface any partial-review metadata so reviewers see coverage
              // gaps. Triggered by either an explicit non-success status
              // (e.g. completed_with_errors, completed_with_warnings) or by
              // the presence of warnings such as token_threshold_exceeded.
              const status = parsed && parsed.status ? String(parsed.status) : '';
              const warnings = Array.isArray(parsed && parsed.warnings) ? parsed.warnings : [];
              const isPartial = (status && status !== 'completed' && status !== 'success') || warnings.length > 0;
              if (!isPartial) return '';

              let block = `⚠️ OCR status: **${status || 'completed_with_warnings'}**\n\n`;
              if (parsed.message) block += `${parsed.message}\n\n`;
              if (warnings.length > 0) {
                block += `Warnings:\n`;
                for (const w of warnings) block += `- ${formatWarning(w)}\n`;
                block += '\n';
              }
              return block;
            }

            function formatWarning(w) {
              if (typeof w === 'string') return w;
              if (w && typeof w === 'object') {
                const parts = [];
                if (w.file) parts.push(`**${w.file}**`);
                if (w.type) parts.push(`(${w.type})`);
                if (w.message) parts.push(w.message);
                return parts.join(' ');
              }
              return String(w);
            }

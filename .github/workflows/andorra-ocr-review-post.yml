# Andorra OCR ensemble review — review + post phase.
#
# SECURITY: this workflow is triggered by `workflow_run` when the companion
# `Andorra OCR Review (build)` workflow finishes. It runs in the BASE-REPO
# context, so it has secret access AND PR-write permissions, BUT it never
# executes PR head code — it only consumes the artifact the build job
# uploaded (the prebuilt `ocr` binary and the committed `.ocr/config.json`).
#
# This is the canonical safe pattern for "build untrusted PR code in one job,
# then act on results with secrets in a different job." See
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
name: Andorra OCR Review (post)

on:
  workflow_run:
    workflows: ["Andorra OCR Review (build)"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  review-and-post:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download build artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ocr-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifact

      - name: Check artifact present
        id: have
        run: |
          if [ -d artifact ] && [ -f artifact/ocr ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No ocr-build artifact — build was skipped (likely no .ocr/config.json committed). Nothing to do."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read PR metadata
        if: steps.have.outputs.present == 'true'
        id: meta
        run: |
          chmod +x artifact/ocr
          echo "pr_number=$(cat artifact/pr_number)"  >> "$GITHUB_OUTPUT"
          echo "base_ref=$(cat artifact/base_ref)"    >> "$GITHUB_OUTPUT"
          echo "head_sha=$(cat artifact/head_sha)"    >> "$GITHUB_OUTPUT"
          echo "base_sha=$(cat artifact/base_sha)"    >> "$GITHUB_OUTPUT"

      - name: Check out base ref (trusted code only)
        if: steps.have.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Fetch PR head commit (as a ref, not a checkout)
        if: steps.have.outputs.present == 'true'
        run: |
          # We need the PR head commit to be reachable so `git diff` works,
          # but we deliberately do NOT check it out. Working tree stays at
          # the trusted base ref.
          git fetch origin "${{ steps.meta.outputs.head_sha }}"

      - name: Run ensemble review
        if: steps.have.outputs.present == 'true'
        env:
          # Names match what `ocr config export --placeholder-secrets` wrote
          # into .ocr/config.json. Edit as needed for your providers.
          OCR_ANTHROPIC_API_KEY: ${{ secrets.OCR_ANTHROPIC_API_KEY }}
          OCR_OPENAI_API_KEY:    ${{ secrets.OCR_OPENAI_API_KEY }}
          OCR_BEDROCK_API_KEY:   ${{ secrets.OCR_BEDROCK_API_KEY }}
          OCR_BEDROCK_REGION:    ${{ secrets.OCR_BEDROCK_REGION }}
        run: |
          ./artifact/ocr review \
            --ensemble \
            --config artifact/config.json \
            --from ${{ steps.meta.outputs.base_sha }} \
            --to   ${{ steps.meta.outputs.head_sha }} \
            --format json \
            > review.json

      - name: Post review comments
        if: steps.have.outputs.present == 'true' && hashFiles('review.json') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const pr = ${{ steps.meta.outputs.pr_number }};
            const data = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const comments = (data.comments || []).map(c => ({
              path: c.path,
              line: c.end_line || c.start_line,
              side: 'RIGHT',
              body: c.content + (c.suggestion_code
                ? '\n\n```suggestion\n' + c.suggestion_code + '\n```'
                : '')
            }));
            const summary = data.ensemble
              ? `**Andorra OCR ensemble:** ${data.ensemble.scanners.length} scanners, ${data.ensemble.groups.length} groups → ${comments.length} accepted bug(s).`
              : `**Andorra OCR:** ${comments.length} comment(s).`;
            if (comments.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: summary + '\n\n_No accepted-bug findings on this diff._'
              });
              return;
            }
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                commit_id: '${{ steps.meta.outputs.head_sha }}',
                event: 'COMMENT',
                body: summary,
                comments
              });
            } catch (err) {
              core.warning(`createReview failed: ${err.message}. Falling back to issue comment.`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: summary + '\n\n' + comments.map(c =>
                  `**${c.path}:${c.line}** — ${c.body}`).join('\n\n---\n\n')
              });
            }

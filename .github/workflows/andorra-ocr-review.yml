# Andorra OCR ensemble review on pull requests.
#
# This workflow expects a committed `.ocr/config.json` at the repo root,
# produced by running `ocr config export` locally. The file references API
# keys via ${env:NAME} placeholders, which CI fills from repository secrets.
#
# To set up:
#   1. Locally:   ocr config ui  (or `ocr config provider`, `ocr config set ...`)
#   2. Locally:   ocr config export        (writes .ocr/config.json)
#   3. Commit:    git add .ocr/config.json && git commit
#   4. In CI:     add the API keys this workflow references as repo secrets
#                 (OCR_ANTHROPIC_API_KEY, OCR_OPENAI_API_KEY, etc. - the names
#                 match what the export placed in your .ocr/config.json).
name: Andorra OCR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=50

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build OCR
        run: go build -o ocr ./cmd/opencodereview

      - name: Run ensemble review
        env:
          # These names match what `ocr config export --placeholder-secrets`
          # writes into .ocr/config.json. Edit to match your providers.
          OCR_ANTHROPIC_API_KEY: ${{ secrets.OCR_ANTHROPIC_API_KEY }}
          OCR_OPENAI_API_KEY: ${{ secrets.OCR_OPENAI_API_KEY }}
        run: |
          ./ocr review \
            --ensemble \
            --config .ocr/config.json \
            --from origin/${{ github.event.pull_request.base.ref }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --format json \
            > review.json

      - name: Post review comments
        if: always() && hashFiles('review.json') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const comments = (data.comments || []).map(c => ({
              path: c.path,
              line: c.end_line || c.start_line,
              side: 'RIGHT',
              body: c.content + (c.suggestion_code
                ? '\n\n```suggestion\n' + c.suggestion_code + '\n```'
                : '')
            }));
            const summary = data.ensemble
              ? `**Andorra OCR ensemble:** ${data.ensemble.scanners.length} scanners, ${data.ensemble.groups.length} groups → ${comments.length} accepted bug(s).`
              : `**Andorra OCR:** ${comments.length} comment(s).`;
            if (comments.length === 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary + '\n\n_No accepted-bug findings on this diff._'
              });
              return;
            }
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: '${{ github.event.pull_request.head.sha }}',
                event: 'COMMENT',
                body: summary,
                comments
              });
            } catch (err) {
              core.warning(`createReview failed: ${err.message}. Falling back to issue comment.`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary + '\n\n' + comments.map(c =>
                  `**${c.path}:${c.line}** — ${c.body}`).join('\n\n---\n\n')
              });
            }

# Andorra Review ensemble review on pull requests.
#
# === TRIGGERS ===
#   1. pull_request_target — opened/synchronize/reopened/ready_for_review.
#      Standard automatic flow.
#   2. issue_comment — when a repo collaborator comments "@andorra" (e.g.
#      "@andorra review") on a PR. Useful to re-run after a transient
#      failure or to review a draft on demand. The author_association
#      check below limits this to OWNER / MEMBER / COLLABORATOR so a
#      random commenter can't burn through scanner quota.
#
# === SECURITY MODEL ===
# This workflow runs with secret access on both triggers above. The safety
# story:
#
#   1. The OCR binary is built from a TRUSTED REF (prod of the Andorra
#      fork), never from PR source.
#   2. The config file (.ocr/config.json) is read from the BASE ref. Fork
#      PRs cannot redirect API calls or change scanner config by editing
#      that file in their branch.
#   3. PR head code is checked out into pr-head/ as SANDBOXED DATA. The
#      OCR binary reads those files as text (it's a static review tool —
#      it never executes the code under review). Secrets are passed only
#      to the trusted OCR binary, not to anything sourced from PR head.
#   4. issue_comment triggers are gated on author_association so only
#      users with write access can fire a run with the workflow's secrets.
#
# This is the standard mitigation for the pull_request_target pwn-request
# antipattern: https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
#
# === SETUP ===
#   1. Locally:   ocr config ui     (configure scanners + arbiter)
#   2. Locally:   ocr config export (writes .ocr/config.json with placeholders)
#   3. Commit:    git add .ocr/config.json && git commit
#   4. In CI:     add OCR_<UPPER_PROVIDER>_API_KEY secrets for each provider
#                 referenced in .ocr/config.json (the runtime resolver and
#                 the dynamic env-derivation in the review step both use
#                 this convention).
name: Andorra Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

# Global concurrency: only one Andorra Review run is active at a time across the
# whole repository. This keeps a single shared LLM endpoint from being swamped
# by simultaneous reviews on multiple PRs. New triggers queue instead of
# cancelling the in-flight run.
concurrency:
  group: andorra-review-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  # issues: write covers the createComment fallback the post-review step
  # uses when createReview fails or there are no inline comments to attach,
  # and the 👍 reaction we drop on the trigger comment.
  issues: write
  actions: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Three gates:
    #   - pull_request_target: run unless the PR is a draft.
    #   - issue_comment: comment must be on a PR (not a plain issue), must
    #     contain "@andorra", and the commenter must have repo write
    #     access (OWNER / MEMBER / COLLABORATOR). Without the
    #     author_association check, anyone who can comment on a fork PR
    #     could burn through scanner quota and trip rate limits.
    if: >-
      (github.event_name == 'pull_request_target' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@andorra') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    steps:
      - name: React to trigger comment with 👀 (issue_comment only)
        if: github.event_name == 'issue_comment'
        id: eyes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reaction = await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });
            core.setOutput('reaction_id', String(reaction.data.id));

      - name: Resolve PR context (head/base SHAs + clone URLs, normalized
              across pull_request_target and issue_comment events)
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let pr;
            if (context.eventName === 'pull_request_target') {
              pr = context.payload.pull_request;
            } else {
              // issue_comment carries only the PR number; fetch full PR
              // details so we get the same head/base shape downstream.
              const r = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = r.data;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_repo_url', pr.head.repo.clone_url);
            core.setOutput('base_repo_url', pr.base.repo.clone_url);

      - name: Check out BASE ref (trusted — controls .ocr/config.json)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          fetch-depth: 0

      - name: Detect committed config
        id: detect
        run: |
          if [ -f .ocr/config.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::.ocr/config.json not present in base ref — skipping Andorra Review review."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove 👀 reaction when config is missing
        if: github.event_name == 'issue_comment' && steps.detect.outputs.present == 'false' && steps.eyes.outputs.reaction_id != ''
        uses: actions/github-script@v7
        env:
          REACTION_ID: ${{ steps.eyes.outputs.reaction_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.reactions.deleteForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              reaction_id: parseInt(process.env.REACTION_ID, 10),
            });

      - name: Fetch PR head into pr-head/ via raw git (avoids actions/checkout
              refusing fork-head SHAs under pull_request_target; see
              https://github.blog/changelog/2026-06-18-safer-pull_request_target-defaults-for-github-actions-checkout/)
        if: steps.detect.outputs.present == 'true'
        env:
          # head.repo.clone_url is set even for forks. We treat the result as
          # data: the trusted OCR binary reads files but never executes them.
          HEAD_REPO_URL: ${{ steps.pr.outputs.head_repo_url }}
          BASE_REPO_URL: ${{ steps.pr.outputs.base_repo_url }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          # GITHUB_TOKEN authenticates the raw clone for PRs from PRIVATE forks.
          # Public forks fetch fine without auth. The token is GitHub-issued and
          # only read by git's local config inside pr-head/, never echoed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init pr-head
          cd pr-head
          git config advice.detachedHead false
          # Attach token to both remotes via http.extraheader so fetches from
          # private fork repos succeed. Restrict the header to github.com hosts
          # so we never send the token to a non-GitHub URL.
          # GitHub's git HTTPS endpoint expects HTTP Basic auth with the
          # token as the password, mirroring what actions/checkout does
          # (https://github.com/actions/checkout/blob/main/src/git-auth-helper.ts).
          BASIC_CRED="$(printf '%s' "x-access-token:${GH_TOKEN}" | base64 -w0)"
          AUTH_HDR="AUTHORIZATION: basic ${BASIC_CRED}"
          git config "http.https://github.com/.extraheader" "${AUTH_HDR}"

          git remote add origin "${HEAD_REPO_URL}"
          git remote add base "${BASE_REPO_URL}"

          # Full fetch (no --depth) so `git merge-base origin/<base>..HEAD`
          # always succeeds — shallow clones miss the merge base when the PR
          # diverged more than N commits ago. Use --filter=blob:none to
          # skip blob downloads and keep this fast on large repos.
          git fetch --filter=blob:none --no-tags base "${BASE_REF}"
          git fetch --filter=blob:none --no-tags origin "${HEAD_SHA}"

          git checkout --detach "${HEAD_SHA}"
          # Make origin/<base> resolvable for `--from`.
          git update-ref "refs/remotes/origin/${BASE_REF}" "$(git rev-parse base/${BASE_REF})"

      - name: Set up Go
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Check Tailscale OAuth credentials are visible
        if: steps.detect.outputs.present == 'true'
        env:
          # Prefer repository variables, but fall back to secrets for repos that
          # have not migrated the Tailscale OAuth client credentials yet.
          TS_OAUTH_CLIENT_ID: ${{ vars.TS_OAUTH_CLIENT_ID || secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ vars.TS_OAUTH_SECRET || secrets.TS_OAUTH_SECRET }}
        run: |
          # Diagnostic: verify the repository can read the Tailscale OAuth credentials.
          # Length is printed; values remain masked by GitHub if non-empty.
          echo "TS_OAUTH_CLIENT_ID length: ${#TS_OAUTH_CLIENT_ID}"
          echo "TS_OAUTH_SECRET length: ${#TS_OAUTH_SECRET}"

      - name: Sanity check resolved Tailscale OAuth lengths
        if: steps.detect.outputs.present == 'true'
        env:
          TS_OAUTH_CLIENT_ID: ${{ vars.TS_OAUTH_CLIENT_ID || secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ vars.TS_OAUTH_SECRET || secrets.TS_OAUTH_SECRET }}
        run: |
          # Print the lengths of the credentials that will be passed to the
          # Tailscale action. Values remain masked by GitHub if non-empty.
          echo "Resolved TS_OAUTH_CLIENT_ID length: ${#TS_OAUTH_CLIENT_ID}"
          echo "Resolved TS_OAUTH_SECRET length: ${#TS_OAUTH_SECRET}"

      - name: Connect to Tailscale (so the runner can reach *.ts.net hosts
              like the Spark LLM endpoint configured in .ocr/config.json)
        if: steps.detect.outputs.present == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID || secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ vars.TS_OAUTH_SECRET || secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Resolve Andorra Review HEAD SHA (cache key source)
        id: ocr-sha
        if: steps.detect.outputs.present == 'true'
        env:
          # Same source-of-truth as the install step below. Keep these two
          # in sync if you ever move off prod.
          ANDORRA_OCR_REPO: https://github.com/Andorra-Labs/Andorra-Code-Review.git
          ANDORRA_OCR_REF: prod
        run: |
          set -euo pipefail
          # Resolve once so the cache key and the install both pin to the
          # same SHA — if prod moves between these two steps, the cached
          # binary still corresponds to a real commit (not whatever prod
          # happens to point at later).
          sha=$(git ls-remote "${ANDORRA_OCR_REPO}" "refs/heads/${ANDORRA_OCR_REF}" | cut -f1)
          if [ -z "$sha" ] || ! [[ "$sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::could not resolve ${ANDORRA_OCR_REF} on ${ANDORRA_OCR_REPO} (got '${sha}')"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Restore cached opencodereview binary
        id: ocr-cache
        if: steps.detect.outputs.present == 'true'
        uses: actions/cache@v4
        with:
          # Cache the built binary keyed on the source SHA. Free up to
          # 10 GB / repo and evicted after 7 days of no access; one
          # opencodereview binary is ~30-60 MB so we're well under the
          # quota even with many cached SHAs.
          path: ~/go/bin/opencodereview
          key: opencodereview-${{ runner.os }}-${{ steps.ocr-sha.outputs.sha }}

      - name: Install Andorra Review (cache miss only)
        if: steps.detect.outputs.present == 'true' && steps.ocr-cache.outputs.cache-hit != 'true'
        env:
          # SECURITY TRADEOFF: ANDORRA_OCR_REF (above) points at `prod` so
          # newest pushes are picked up automatically. Because this workflow
          # runs under `pull_request_target` with secret access, anyone with
          # push to `prod` can change what trusted code runs here with those
          # secrets. This is acceptable for a same-team fork where everyone
          # with push to `prod` is already trusted; switch back to a pinned
          # release tag or commit SHA if that assumption ever stops holding.
          ANDORRA_OCR_REPO: https://github.com/Andorra-Labs/Andorra-Code-Review.git
          # We always install at the SHA the cache key was derived from,
          # never the floating `prod`. This guarantees the binary in the
          # cache matches the source SHA in its key.
          ANDORRA_OCR_REF: ${{ steps.ocr-sha.outputs.sha }}
        run: |
          set -euo pipefail
          # Build from a clean clone of the fork at the resolved SHA. We
          # don't `go install github.com/.../cmd/opencodereview@SHA` because
          # the fork keeps the upstream module path, so that command would
          # fetch upstream code, not the fork.
          tmp="$(mktemp -d)"
          git clone --no-checkout --filter=blob:none "${ANDORRA_OCR_REPO}" "${tmp}/src"
          git -C "${tmp}/src" -c advice.detachedHead=false checkout "${ANDORRA_OCR_REF}"
          (cd "${tmp}/src" && go build -o "$(go env GOPATH)/bin/opencodereview" ./cmd/opencodereview)

      - name: Put opencodereview on PATH (runs on cache hit AND miss)
        if: steps.detect.outputs.present == 'true'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Stage trusted rule file (from base ref, not PR head)
        if: steps.detect.outputs.present == 'true'
        run: |
          # If the base ref carries a project rule file, copy it to a known
          # path that the review step can pass via --rule. Without this, OCR
          # would discover .opencodereview/rule.json inside pr-head/ and read
          # PR-author-controlled rules that could exclude changed files from
          # review or otherwise tilt the result.
          if [ -f .opencodereview/rule.json ]; then
            mkdir -p trusted-rules
            cp .opencodereview/rule.json trusted-rules/rule.json
            echo "TRUSTED_RULE_PATH=$(pwd)/trusted-rules/rule.json" >> "$GITHUB_ENV"
          fi
          # Unconditionally remove the PR-head rule discovery surface. Even when
          # --rule is set, rules.NewResolver still auto-discovers a project
          # rule.json under repoDir; without this scrub, a fork PR adding
          # pr-head/.opencodereview/rule.json could still inject PR-author-
          # controlled rules into a base-config repo. Removing the entire path
          # avoids following a malicious symlink in pr-head/.opencodereview.
          rm -rf pr-head/.opencodereview || true

      - name: Stage trusted .gitignore (from base ref, not PR head)
        if: steps.detect.outputs.present == 'true'
        run: |
          # The diff provider reads repoDir/.gitignore when filtering parsed
          # diffs. Copy the base ref's ignore rules over the PR-head checkout
          # so a fork PR cannot hide changed files by adding patterns like
          # `*.go` to its branch's .gitignore. If the base ref has no
          # .gitignore, delete any PR-head .gitignore so a fork PR cannot
          # inject one either.
          if [ -f .gitignore ]; then
            cp .gitignore pr-head/.gitignore
          else
            rm -f pr-head/.gitignore
          fi

      - name: Post initial Andorra Review status comment
        if: steps.detect.outputs.present == 'true'
        id: status
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const body = '**Andorra Review in progress** 👀\n\n' +
              '_Scanning will begin shortly…_';
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            core.setOutput('comment_id', String(comment.data.id));

      - name: Run ensemble review (trusted binary + base config/rules + sandboxed PR data)
        if: steps.detect.outputs.present == 'true'
        id: review
        working-directory: pr-head
        env:
          STATUS_COMMENT_ID: ${{ steps.status.outputs.comment_id }}
          # The progress-monitor wrapper (run: below) PATCHes the status
          # comment via the REST API, so it needs the token in its env.
          # GITHUB_TOKEN is not injected automatically — it must be mapped.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forward the whole secrets blob so the run script can derive
          # OCR_<UPPER_PROVIDER>_API_KEY for each provider referenced in
          # .ocr/config.json. Hardcoding one env entry per provider here
          # would force a workflow edit every time a new provider lands;
          # toJSON(secrets) lets us match the OCR resolver's runtime
          # naming convention (see internal/configstore/export.go's
          # envForProviderKey) without us caring which providers exist.
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
          # Non-secret model id, supplied via an org/repo variable, so the
          # config can reference "${env:OCR_SPARK_LLM_MODEL}" instead of
          # hardcoding the model. vars resolves org-level variables too.
          OCR_SPARK_LLM_MODEL: ${{ vars.OCR_SPARK_LLM_MODEL }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Build --rule arg only when the base ref committed a rule file;
          # otherwise OCR uses its built-in defaults and ignores any
          # PR-head .opencodereview/rule.json (because --rule, when set,
          # short-circuits the auto-discovery path).
          rule_arg=()
          if [ -n "${TRUSTED_RULE_PATH:-}" ]; then
            rule_arg=(--rule "${TRUSTED_RULE_PATH}")
          fi

          # Collect every provider name referenced by the base-ref config:
          # top-level `provider`, each ensemble scanner's provider, the
          # arbiter's provider, plus every key under `custom_providers`.
          # We read the config from the BASE ref (../.ocr/config.json from
          # pr-head/), not from PR head, so a fork PR can't introduce new
          # provider names to harvest extra secrets here.
          mapfile -t providers < <(
            jq -r '
              [
                (.provider // empty),
                (.ensemble.arbiter.provider // empty),
                (.ensemble.scanners // [])[].provider,
                (.custom_providers // {} | keys[])
              ] | map(select(. != null and . != ""))
                | unique[]
            ' ../.ocr/config.json
          )

          # For each provider, derive OCR_<UPPER>_API_KEY following the
          # same sanitization OCR's runtime uses, then pull the value
          # from the secrets JSON and export it.
          for p in "${providers[@]}"; do
            upper=$(printf '%s' "$p" | tr '[:lower:]' '[:upper:]' \
              | sed 's/[^A-Z0-9_]/_/g; s/__*/_/g; s/^_*//; s/_*$//')
            [ -z "$upper" ] && upper=PROVIDER
            var_name="OCR_${upper}_API_KEY"
            value=$(printf '%s' "$ALL_SECRETS_JSON" \
              | jq -r --arg k "$var_name" '.[$k] // empty')
            if [ -n "$value" ]; then
              # Mask the value in any subsequent log line that echoes it,
              # then export so the OCR child process inherits it.
              echo "::add-mask::$value"
              export "${var_name}=${value}"
            fi
          done

          # OCR_BEDROCK_REGION is the one non-key env var the resolver
          # expects; pull it from the same blob so users keeping Bedrock
          # configs don't need a special-case workflow entry.
          region=$(printf '%s' "$ALL_SECRETS_JSON" \
            | jq -r '.OCR_BEDROCK_REGION // empty')
          if [ -n "$region" ]; then
            export OCR_BEDROCK_REGION="$region"
          fi
          # Don't leak the JSON blob to the child process.
          unset ALL_SECRETS_JSON

          # --debug-trace is written even when every scanner fails, and stderr
          # is captured to a file so failures can be diagnosed from artifacts.
          # --progress-file lets the workflow update a live status comment.
          python3 - "$STATUS_COMMENT_ID" <<'PY'
          import json, os, subprocess, sys, time, urllib.request, urllib.error

          comment_id = sys.argv[1]
          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          progress_file = '../progress.json'
          review_file = '../review.json'
          log_file = '../review.log'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
          }

          print('::group::Andorra Review checkpoints')
          start_ts = time.time()

          def checkpoint(msg):
              elapsed = time.time() - start_ts
              print(f'[checkpoint +{elapsed:6.1f}s] {msg}')

          checkpoint('Starting Andorra Review progress monitor')

          STATUS_EMOJI = {
              'pending': '⏳',
              'running': '👀',
              'ok': '✅',
              'complete': '✅',
              'error': '❌',
              'failed': '❌',
              'partial': '⚠️',
          }

          def update_comment(body):
              data = json.dumps({'body': body}).encode()
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/issues/comments/{comment_id}',
                  data=data, headers=headers, method='PATCH')
              try:
                  urllib.request.urlopen(req, timeout=30)
              except urllib.error.HTTPError as e:
                  print(f'::warning::progress comment update failed: {e.code} {e.reason}', file=sys.stderr)

          def render_progress(progress):
              lines = ['**Andorra Review in progress** 👀', '']
              lines.append('### Scanners')
              for s in progress.get('scanners', []):
                  status = s.get('status', 'pending')
                  emoji = STATUS_EMOJI.get(status, '❓')
                  iter_text = f" (iteration {s.get('iteration', 1)})" if status == 'running' else ''
                  findings_text = f" — {s.get('findings', 0)} finding(s)" if status in ('ok', 'complete', 'partial') else ''
                  lines.append(f"- {emoji} **{s.get('name', 'unknown')}**{iter_text}{findings_text}")
              arbiter = progress.get('arbiter', {})
              a_status = arbiter.get('status', 'pending')
              a_emoji = STATUS_EMOJI.get(a_status, '⏳')
              lines.append('')
              lines.append('### Arbiter')
              lines.append(f"- {a_emoji} **Arbiter**")
              message = progress.get('message')
              if message:
                  lines.append('')
                  lines.append(f"_{message}_")
              return '\n'.join(lines)

          rule_arg = []
          if os.environ.get('TRUSTED_RULE_PATH'):
              rule_arg = ['--rule', os.environ['TRUSTED_RULE_PATH']]

          cmd = [
              'opencodereview', 'review',
              '--ensemble',
              '--config', '../.ocr/config.json',
              *rule_arg,
              '--from', f"origin/{os.environ['PR_BASE_REF']}",
              '--to', os.environ['PR_HEAD_SHA'],
              '--format', 'json',
              '--debug-trace', '../debug-trace.json',
              '--progress-file', progress_file,
          ]

          safe_cmd = ' '.join(cmd)
          checkpoint(f'Starting OCR subprocess: {safe_cmd}')

          with open(review_file, 'w') as review_f, open(log_file, 'w') as logf:
              proc = subprocess.Popen(cmd, stdout=review_f, stderr=logf)
              last_progress = None
              poll_interval = 15
              while True:
                  try:
                      proc.wait(timeout=poll_interval)
                      break
                  except subprocess.TimeoutExpired:
                      pass
                  if os.path.exists(progress_file):
                      try:
                          with open(progress_file) as f:
                              progress = json.load(f)
                          if progress != last_progress:
                              scanner_statuses = ', '.join(
                                  f"{s.get('name')}:{s.get('status')}(iter{s.get('iteration',1)})"
                                  for s in progress.get('scanners', [])
                              )
                              arbiter_status = progress.get('arbiter', {}).get('status', 'pending')
                              checkpoint(
                                  f"Progress update — stage={progress.get('stage')}, "
                                  f"scanners=[{scanner_statuses}], arbiter={arbiter_status}"
                              )
                              update_comment(render_progress(progress))
                              last_progress = progress
                      except Exception as e:
                          print(f'::debug::progress poll error: {e}', file=sys.stderr)

          checkpoint(f'OCR subprocess finished with exit code {proc.returncode}')
          print('::endgroup::')

          # On any failure (e.g. the LLM gateway is unreachable / no models
          # loaded), surface OCR's captured stderr directly in the Actions run
          # log so the cause is visible without downloading the review.log
          # artifact. We don't try to recover — the workflow still fails.
          if proc.returncode != 0:
              print(f'::group::Andorra Review failed (exit {proc.returncode}) — review.log')
              try:
                  with open(log_file) as lf:
                      log_text = lf.read()
                  sys.stdout.write(log_text if log_text.strip() else '(review.log is empty)\n')
              except OSError as e:
                  print(f'(could not read {log_file}: {e})')
              print('::endgroup::')
              print(f'::error::Andorra Review failed with exit code {proc.returncode} — see review.log above')

          sys.exit(proc.returncode)
          PY

      - name: Update status comment on failure
        if: ${{ failure() && steps.detect.outputs.present == 'true' && steps.status.outputs.comment_id != '' }}
        uses: actions/github-script@v7
        env:
          STATUS_COMMENT_ID: ${{ steps.status.outputs.comment_id }}
          REACTION_ID: ${{ steps.eyes.outputs.reaction_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const statusCommentId = parseInt(process.env.STATUS_COMMENT_ID, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // OCR's stderr, if the reviewer got far enough to write it. A run
            // that fails during setup (e.g. an unreachable gateway aborts before
            // any output, or a workflow/config error) leaves no review.log.
            let log = '';
            try { log = fs.readFileSync('review.log', 'utf8').replace(/\s+$/, ''); } catch (e) {}
            const lines = log ? log.split('\n').map(l => l.replace(/\s+$/, '')).filter(Boolean) : [];

            // Surface the most informative lines (errors/warnings OCR emits)
            // rather than a blind tail, so the comment says *why* it failed.
            const ERROR_RE = /(error|fail(ed|ure)?|deadline exceeded|timed?\s?out|connection refused|refused|no such host|dial tcp|unreachable|no models|unauthorized|forbidden|not found|\b[45]\d\d\b|panic|cannot|could not|unable)/i;
            const highlights = [...new Set(lines.filter(l => ERROR_RE.test(l)))].slice(-8);

            let body = '**Andorra Review failed** ❌\n\n';
            if (highlights.length) {
              body += '```text\n' + highlights.join('\n') + '\n```\n';
            } else if (lines.length) {
              body += '```text\n' + lines.slice(-10).join('\n') + '\n```\n';
            } else {
              body += '_No review log was produced — the run failed before the reviewer started ' +
                      '(e.g. setup, a workflow/config error, or an unreachable LLM gateway)._\n';
            }
            body += `\n[View full run logs](${runUrl})`;
            if (lines.length) {
              const tail = lines.slice(-40).join('\n');
              body += '\n\n<details>\n<summary>review.log (tail)</summary>\n\n```text\n' + tail + '\n```\n\n</details>';
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: statusCommentId,
              body,
            });
            const reactionId = process.env.REACTION_ID;
            if (reactionId) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: parseInt(reactionId, 10),
              });
            }

      - name: Upload Andorra Review debug artifacts
        if: ${{ !cancelled() && steps.detect.outputs.present == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: andorra-review-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            review.log
            debug-trace.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Post review comments
        if: steps.detect.outputs.present == 'true' && hashFiles('review.json') != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          STATUS_COMMENT_ID: ${{ steps.status.outputs.comment_id }}
          REACTION_ID: ${{ steps.eyes.outputs.reaction_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('review.json', 'utf8'));
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const headSha = process.env.PR_HEAD_SHA;

            // Severity → shields.io badge color. P1 critical = red, P2
            // warning = yellow, P3 nit = blue. Unknown / missing values render
            // without a badge so the comment still posts cleanly.
            const SEVERITY_COLOR = { P1: 'red', P2: 'yellow', P3: 'blue' };
            const renderHeader = (severity, title) => {
              const t = (title || '').trim();
              const sev = (severity || '').trim().toUpperCase();
              const color = SEVERITY_COLOR[sev];
              if (color && t) {
                return `**<sub><sub>![${sev} Badge](https://img.shields.io/badge/${sev}-${color}?style=flat)</sub></sub>  ${t}**\n\n`;
              }
              if (t) return `**${t}**\n\n`;
              return '';
            };

            // Split findings into inline-renderable vs no-line. createReview
            // rejects the whole batch if any comment has line=0, so unresolved
            // findings (where the diff resolver couldn't match existing_code
            // back to a line) get reported separately in the summary text.
            const allComments = (data.comments || []).map(c => ({
              path: c.path,
              startLine: c.start_line,
              line: c.end_line || c.start_line,
              body: renderHeader(c.severity, c.title) + c.content + (c.suggestion_code
                ? '\n\n```suggestion\n' + c.suggestion_code + '\n```'
                : '')
            }));
            const inline = allComments.filter(c => c.line > 0).map(c => {
              // Preserve multi-line ranges so GitHub suggestions cover the
              // scanner's intended hunk rather than collapsing to one line.
              const comment = {
                path: c.path,
                line: c.line,
                side: 'RIGHT',
                body: c.body,
              };
              if (c.startLine > 0 && c.startLine < c.line) {
                comment.start_line = c.startLine;
                comment.start_side = 'RIGHT';
              }
              return comment;
            });
            const unresolved = allComments.filter(c => !(c.line > 0));

            const warnings = (data.warnings || []);
            const warningLine = warnings.length
              ? `\n\n⚠️ **${warnings.length} warning(s):** ` +
                warnings.map(w => `${w.type || 'warning'}: ${w.message || ''}`).join('; ')
              : '';

            const unresolvedSection = unresolved.length
              ? '\n\n**Unresolved-line findings** (could not match to a diff line):\n\n' +
                unresolved.map(c => `- **${c.path}** — ${c.body}`).join('\n\n')
              : '';

            const ensembleScanners = data.ensemble?.scanners || [];
            const ensembleGroups = data.ensemble?.groups || [];
            // Break down the arbiter's verdicts so the summary reports how many
            // findings were found and how many it accepted vs rejected.
            const verdicts = { accepted_bug: 0, rejected_fp: 0, uncertain: 0, style_only: 0 };
            for (const g of ensembleGroups) {
              if (Object.prototype.hasOwnProperty.call(verdicts, g.verdict)) verdicts[g.verdict]++;
            }
            const summary = data.ensemble
              ? `**Andorra Review ensemble:** ${ensembleScanners.length} scanner(s) · ${ensembleGroups.length} finding(s) → ` +
                `✅ ${verdicts.accepted_bug} accepted · 🚫 ${verdicts.rejected_fp} rejected · ` +
                `❓ ${verdicts.uncertain} uncertain · 🎨 ${verdicts.style_only} style-only` +
                `${unresolved.length ? ` · ${unresolved.length} unresolved-line` : ''}.`
              : `**Andorra Review:** ${inline.length} comment(s)${unresolved.length ? ` + ${unresolved.length} unresolved-line` : ''}.`;

            // Per-scanner breakdown so users can see which scanners contributed
            // findings and which failed or timed out. Inside it, each scanner
            // gets a nested dropdown with its complete raw output (every
            // candidate it emitted, before dedup/arbiter), so a reviewer can see
            // what a scanner actually found even when the arbiter fails and the
            // accepted-only view above is empty.
            let scannerSection = '';
            if (ensembleScanners.length > 0) {
              const statusEmoji = { ok: '✅', partial: '⚠️', error: '❌' };
              const scannerRows = ensembleScanners.map(s => {
                const emoji = statusEmoji[s.status] || '❓';
                const modelSub = s.model && s.model !== s.name ? `<br><sub>${s.model}</sub>` : '';
                const errSub = s.err ? `<br><sub>${s.err}</sub>` : '';
                return `| ${emoji} **${s.name}**${modelSub} | ${s.status} | ${s.findings || 0} | ${s.provider || '—'}${errSub} |`;
              });

              // Render each scanner's raw output as a nested dropdown. GitHub
              // caps an issue-comment body at 65536 chars and rejects the PATCH
              // otherwise, so we render under a char budget and truncate long
              // fields / overflow findings, pointing at the debug-trace.json
              // artifact (which always has the complete, untruncated output).
              const FIELD_CAP = 1500;       // per detail/code-block field
              let rawBudget = 45000;        // shared across all nested blocks
              const truncate = (str, n) => {
                const t = (str == null ? '' : String(str));
                return t.length > n
                  ? t.slice(0, n) + `\n…(${t.length - n} more char(s) — see debug-trace.json artifact)`
                  : t;
              };
              // Fence code in quadruple backticks so embedded ``` in scanner
              // output can't break out of the block.
              const fence = (code) => '````\n' + truncate(code, FIELD_CAP) + '\n````';
              const renderRawFinding = (f, n) => {
                const loc = f.path
                  ? `\`${f.path}:${f.start_line || 0}${f.end_line && f.end_line !== f.start_line ? '-' + f.end_line : ''}\``
                  : '_(no location)_';
                const meta = [
                  f.severity ? String(f.severity).toUpperCase() : null,
                  (typeof f.confidence === 'number' && f.confidence > 0) ? `confidence ${f.confidence.toFixed(2)}` : null,
                ].filter(Boolean).join(' · ');
                const parts = [`**${n}.** ${loc}${meta ? ' · ' + meta : ''}`];
                if (f.explicit_title && f.title) parts.push(`**${f.title}**`);
                if (f.detail) parts.push('', truncate(f.detail, FIELD_CAP));
                if (f.existing_code) parts.push('', '_existing:_', fence(f.existing_code));
                if (f.suggestion_code) parts.push('', '_suggested:_', fence(f.suggestion_code));
                return parts.join('\n');
              };
              const rawBlockFor = (s) => {
                const raw = Array.isArray(s.raw) ? s.raw : [];
                if (raw.length === 0) return '';
                let block = `\n\n<details>\n<summary>${s.name} — full output (${raw.length} finding(s))</summary>\n\n`;
                let shown = 0;
                for (let i = 0; i < raw.length; i++) {
                  const piece = renderRawFinding(raw[i], i + 1) + (i < raw.length - 1 ? '\n\n---\n' : '\n');
                  if (piece.length > rawBudget) {
                    block += `\n_Output truncated — ${raw.length - shown} more finding(s) omitted to fit GitHub's comment limit. See the debug-trace.json artifact for each scanner's complete output._\n`;
                    break;
                  }
                  block += piece;
                  rawBudget -= piece.length;
                  shown++;
                }
                return block + '</details>';
              };

              scannerSection = '\n\n<details>\n<summary>Scanner breakdown</summary>\n\n' +
                '| Scanner | Status | Findings | Provider |\n| --- | --- | --- | --- |\n' +
                scannerRows.join('\n') +
                ensembleScanners.map(rawBlockFor).join('') +
                '\n</details>';
            }

            // Format per-model token spend from the CLI's JSON output.
            const fmtNum = (n) => (typeof n === 'number' && !Number.isNaN(n) ? n.toLocaleString() : '—');
            const tokenRows = (data.ensemble?.token_summary || []);
            let tokenSection = '';
            if (tokenRows.length > 0) {
              const anyCache = tokenRows.some(r => (r.tokens?.cache_read_tokens || 0) > 0 || (r.tokens?.cache_write_tokens || 0) > 0);
              const anyCost = tokenRows.some(r => r.cost_known);
              const anyLocal = tokenRows.some(r => r.is_local);
              const headers = ['Model', 'Input', 'Output', anyCache ? 'Cache' : null, 'Total', anyCost || anyLocal ? 'Cost (USD)' : null].filter(Boolean);
              const renderCost = (r) => {
                if (r.is_local) return '(local)';
                if (!r.cost_known) return '—';
                return `$${r.cost_usd.toFixed(4)}`;
              };
              const renderCache = (r) => {
                const parts = [];
                if ((r.tokens?.cache_read_tokens || 0) > 0) parts.push(`read ${fmtNum(r.tokens.cache_read_tokens)}`);
                if ((r.tokens?.cache_write_tokens || 0) > 0) parts.push(`write ${fmtNum(r.tokens.cache_write_tokens)}`);
                return parts.join(', ') || '—';
              };
              const totalTokens = tokenRows.reduce((acc, r) => acc + ((r.tokens?.input_tokens || 0) + (r.tokens?.output_tokens || 0)), 0);
              const totalCost = tokenRows.reduce((acc, r) => acc + (r.cost_known ? r.cost_usd : 0), 0);
              const rows = tokenRows.map(r => {
                const cells = [
                  `**${r.label}**${r.model && r.model !== r.label ? `<br><sub>${r.model}</sub>` : ''}`,
                  fmtNum(r.tokens?.input_tokens),
                  fmtNum(r.tokens?.output_tokens),
                  anyCache ? renderCache(r) : null,
                  fmtNum((r.tokens?.input_tokens || 0) + (r.tokens?.output_tokens || 0)),
                  anyCost || anyLocal ? renderCost(r) : null,
                ].filter(c => c !== null);
                return `| ${cells.join(' | ')} |`;
              });
              const separator = `| ${headers.map(() => '---').join(' | ')} |`;
              const totalRowCells = [
                '**Total**',
                '',
                '',
                anyCache ? '' : null,
                `**${fmtNum(totalTokens)}**`,
                anyCost || anyLocal ? `**$${totalCost.toFixed(4)}**` : null,
              ].filter(c => c !== null);
              const totalRow = `| ${totalRowCells.join(' | ')} |`;
              tokenSection = '\n\n<details>\n<summary>Token usage by model</summary>\n\n' +
                `| ${headers.join(' | ')} |\n${separator}\n` +
                rows.join('\n') + '\n' + totalRow + '\n</details>';
            }

            const body = summary + warningLine + scannerSection + unresolvedSection + tokenSection;
            let finalBody = '**Andorra Review complete** ✅\n\n' + body +
              (inline.length === 0 && unresolved.length === 0 ? '\n\n_No accepted-bug findings on this diff._' : '');

            // Inline findings (if any) go on the diff as a review. The summary
            // itself is finalized in the existing status comment below, so we
            // don't post a second standalone summary comment (no double-post).
            if (inline.length > 0) {
              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: headSha,
                  event: 'COMMENT',
                  body: `**Andorra Review:** ${inline.length} inline finding(s) — see the summary comment.`,
                  comments: inline,
                });
              } catch (err) {
                core.warning(`createReview failed: ${err.message}. Folding inline findings into the summary comment.`);
                finalBody += '\n\n' + inline.map(c =>
                  `**${c.path}:${c.line}** — ${c.body}`).join('\n\n---\n\n');
              }
            }

            // Finalize the live status (dynamic) comment with the summary
            // instead of creating a new one. Only fall back to a fresh comment
            // if the status comment is somehow missing.
            const statusCommentId = process.env.STATUS_COMMENT_ID;
            if (statusCommentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(statusCommentId, 10),
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: finalBody,
              });
            }
            const reactionId = process.env.REACTION_ID;
            if (reactionId) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: parseInt(reactionId, 10),
              });
            }

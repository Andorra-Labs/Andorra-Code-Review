# Andorra OCR ensemble review — build phase.
#
# SECURITY: this workflow uses `pull_request` (not `pull_request_target`), so
# it runs in the FORK context with no access to repository secrets. It builds
# the OCR binary from the PR head and uploads it as an artifact for the
# companion `andorra-ocr-review-post.yml` workflow to consume. Because this
# job has no secrets and no write tokens, malicious fork PRs cannot exfiltrate
# anything by tampering with the checked-out code.
#
# The actual review (which needs secrets to call LLM APIs) and the comment
# posting (which needs the PR-write token) happen in the companion workflow,
# triggered by workflow_run when this job finishes. That workflow never
# executes PR head code — it only consumes the artifact this job produced.
#
# See:
#   https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
#
# Setup:
#   1. Locally:   ocr config ui  (configure scanners + arbiter)
#   2. Locally:   ocr config export
#   3. Commit:    git add .ocr/config.json && git commit
#   4. In CI:     add OCR_ANTHROPIC_API_KEY / OCR_OPENAI_API_KEY /
#                 OCR_BEDROCK_API_KEY / OCR_BEDROCK_REGION as repo or org
#                 secrets, matching the ${env:NAME} placeholders in
#                 your .ocr/config.json.
name: Andorra OCR Review (build)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build:
    name: Build OCR + collect diff
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Check out PR head (no secrets in this job)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=50

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build OCR
        run: go build -o ocr ./cmd/opencodereview

      - name: Stage artifact
        run: |
          mkdir -p artifact
          cp ocr artifact/
          if [ -f .ocr/config.json ]; then
            cp .ocr/config.json artifact/config.json
          else
            echo '::error::.ocr/config.json missing — run `ocr config export` and commit the result.'
            exit 1
          fi
          echo '${{ github.event.pull_request.number }}' > artifact/pr_number
          echo '${{ github.event.pull_request.base.ref }}' > artifact/base_ref
          echo '${{ github.event.pull_request.head.sha }}' > artifact/head_sha
          git rev-parse origin/${{ github.event.pull_request.base.ref }} > artifact/base_sha

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-build
          path: artifact/
          retention-days: 1

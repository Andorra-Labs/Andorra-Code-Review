<section>
  <h2>Ensemble configuration</h2>
  <form method="POST" action="/ensemble" id="ensemble-form">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

    <fieldset>
      <legend>Scanners</legend>
      <p class="hint">Each scanner must point at a provider configured in your upstream config (presets like <code>anthropic</code>, <code>openai</code> work out of the box).</p>
      <table id="scanners-table">
        <thead>
          <tr>
            <th>Name</th><th>Provider</th><th>Model</th>
            <th title="AWS Bedrock toggle: uses OCR_BEDROCK_API_KEY / OCR_BEDROCK_REGION env vars instead of provider api_key">Bedrock</th>
            <th title="Local model: cost column will show (local) instead of $">Local</th>
            <th title="Cost per 1M input tokens (USD)">$/1M in</th>
            <th title="Cost per 1M output tokens (USD)">$/1M out</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {{range $i, $s := .Scanners}}
          <tr>
            <td><input name="scanner_name_{{$i}}" value="{{$s.Name}}" required></td>
            <td><input name="scanner_provider_{{$i}}" value="{{$s.Provider}}" placeholder="(blank if Bedrock)"></td>
            <td><input name="scanner_model_{{$i}}" value="{{$s.Model}}"></td>
            <td><input type="checkbox" name="scanner_bedrock_{{$i}}" value="true" {{if $s.Bedrock}}checked{{end}}></td>
            <td><input type="checkbox" name="scanner_local_{{$i}}" value="true" {{if $s.Local}}checked{{end}}></td>
            <td><input name="scanner_cost_in_{{$i}}" value="{{$s.CostPerMInputUSD}}" type="number" step="0.0001" min="0" style="width:6em"></td>
            <td><input name="scanner_cost_out_{{$i}}" value="{{$s.CostPerMOutputUSD}}" type="number" step="0.0001" min="0" style="width:6em"></td>
            <td><button type="button" class="remove-row">×</button></td>
          </tr>
          {{end}}
        </tbody>
      </table>
      <button type="button" id="add-scanner">+ Add scanner</button>
    </fieldset>

    <fieldset>
      <legend>Arbiter</legend>
      <label>Provider <input name="arbiter_provider" value="{{.A.Provider}}"></label>
      <label>Model <input name="arbiter_model" value="{{.A.Model}}"></label>
      <label>Mode
        <select name="arbiter_mode">
          <option value="" {{if eq .A.Mode ""}}selected{{end}}>(default: per_file)</option>
          <option value="per_file" {{if eq .A.Mode "per_file"}}selected{{end}}>per_file</option>
          <option value="per_group" {{if eq .A.Mode "per_group"}}selected{{end}}>per_group</option>
        </select>
      </label>
      <label><input type="checkbox" name="arbiter_bedrock" value="true" {{if .A.Bedrock}}checked{{end}}> Amazon Bedrock (uses OCR_BEDROCK_* env vars)</label>
      <label><input type="checkbox" name="arbiter_local" value="true" {{if .A.Local}}checked{{end}}> Local model (cost shown as "(local)")</label>
      <label>Cost per 1M input tokens ($) <input name="arbiter_cost_in" value="{{.A.CostPerMInputUSD}}" type="number" step="0.0001" min="0" style="width:8em"></label>
      <label>Cost per 1M output tokens ($) <input name="arbiter_cost_out" value="{{.A.CostPerMOutputUSD}}" type="number" step="0.0001" min="0" style="width:8em"></label>
    </fieldset>

    <fieldset>
      <legend>Dedup thresholds</legend>
      <label>Line overlap min ratio
        <input name="dedup_line_overlap" type="number" step="0.05" min="0" max="1" value="{{.D.LineOverlapMinRatio}}">
      </label>
      <label>Title similarity min
        <input name="dedup_title_sim" type="number" step="0.05" min="0" max="1" value="{{.D.TitleSimilarityMin}}">
      </label>
    </fieldset>

    <fieldset>
      <legend>Output defaults</legend>
      <label>Default verdict filter (comma-separated)
        <input name="output_default_verdicts" value="{{.OutputVerdictsCSV}}" placeholder="accepted_bug">
      </label>
      <label>
        <input type="checkbox" name="output_show_provenance" value="true" {{if .O.ShowProvenance}}checked{{end}}>
        Show scanner provenance in output
      </label>
    </fieldset>

    <p>
      <button type="submit" class="primary">Save</button>
      <a class="button secondary" href="/">Cancel</a>
    </p>
  </form>
</section>
<script src="/static/app.js"></script>
